# Publish web/index.html as GitHub Pages (site root = contents of web/).
# Repo → Settings → Pages → Build and deployment → Source: GitHub Actions (once).

name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      # Single-file app lives in web/index.html. Uploading `path: web` puts it at
      # site root only, so .../repo/web/ 404s. Duplicate into _site/web/ so both
      # https://user.github.io/repo/ and .../repo/web/ work.
      - name: Prepare site (root + web/)
        run: |
          mkdir -p _site/web
          cp web/index.html _site/index.html
          cp web/index.html _site/web/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
